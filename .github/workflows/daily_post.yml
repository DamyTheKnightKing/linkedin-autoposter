name: Daily LinkedIn Post

on:
  schedule:
    - cron: '30 0 * * *'   # 08:30 SGT = 00:30 UTC
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:

  # ── Job 1: Post to LinkedIn ────────────────────────────────────────
  post:
    name: Post to LinkedIn
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests flask python-dotenv google-genai

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LLM_PROVIDER=${{ secrets.LLM_PROVIDER }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          DRY_RUN=false
          EOF

      - name: Restore post history
        uses: actions/cache@v4
        with:
          path: posts.db
          key: posts-db-${{ github.run_number }}
          restore-keys: posts-db-

      - name: Post to LinkedIn
        run: python -m src.main

      - name: Save post history
        uses: actions/cache/save@v4
        if: always()
        with:
          path: posts.db
          key: posts-db-${{ github.run_number }}

      - name: Write comment draft to job summary
        if: always()
        run: |
          if [ -f comment_draft.txt ]; then
            echo "## Proposed Auto-Comment" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Review this comment below. If you approve the pending job, it will be posted to LinkedIn." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # Print only the comment text (skip the URN header lines)
            tail -n +4 comment_draft.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No comment draft generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload comment draft as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comment-draft
          path: comment_draft.txt
          retention-days: 1

  # ── Job 2: Post comment (requires your approval) ──────────────────
  post_comment:
    name: Post Comment (pending your approval)
    needs: post
    runs-on: ubuntu-latest
    environment: comment-approval   # ← pauses here and emails you to review

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Write .env from secrets
        run: |
          cat > .env << EOF
          LINKEDIN_CLIENT_ID=${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET=${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_ACCESS_TOKEN=${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN=${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_TOKEN_EXPIRES_AT=${{ secrets.LINKEDIN_TOKEN_EXPIRES_AT }}
          LINKEDIN_REFRESH_ISSUED_AT=${{ secrets.LINKEDIN_REFRESH_ISSUED_AT }}
          LINKEDIN_PERSON_URN=${{ secrets.LINKEDIN_PERSON_URN }}
          EOF

      - name: Download comment draft
        uses: actions/download-artifact@v4
        with:
          name: comment-draft

      - name: Post comment to LinkedIn
        run: |
          python - << 'EOF'
          from pathlib import Path
          from src.linkedin_client import create_comment
          import os
          from dotenv import load_dotenv
          load_dotenv(".env")

          lines = Path("comment_draft.txt").read_text().splitlines()
          post_urn    = lines[0].split("=", 1)[1]
          person_urn  = lines[1].split("=", 1)[1]
          comment_txt = "\n".join(lines[3:]).strip()

          print(f"Posting comment to: {post_urn}")
          print(f"Comment: {comment_txt}")
          create_comment(post_urn, comment_txt, person_urn)
          EOF
